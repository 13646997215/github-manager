name: ci

on:
  push:
  pull_request:

jobs:
  validate-and-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Repository validation
        run: PYTHONPATH=. python3 scripts/validation/validate_repo.py
      - name: Tests
        run: PYTHONPATH=. python3 -m pytest tests/tools tests/workflows -q
      - name: Benchmark report
        run: python3 scripts/validation/generate_benchmark_report.py > /tmp/benchmark-report.json
      - name: Markdown benchmark digest
        run: python3 scripts/validation/render_markdown_report.py
